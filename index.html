<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орфанный помощник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d7377; --primary-light: #14a3a8;
            --danger: #ef4444; --success: #10b981;
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --shadow: 0 4px 6px rgba(0,0,0,0.04);
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff, #f0fdf4);
            min-height: 100vh; color: var(--text);
        }
        .navbar {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0;
        }
        .btn {
            border-radius: 10px; padding: 8px 16px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.3s; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
        .card {
            border: none; border-radius: var(--radius); background: white;
            box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1rem;
        }
        .dashboard-card {
            cursor: pointer; text-align: center; padding: 1.5rem;
            background: white; border-radius: var(--radius); box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .dashboard-card:hover { transform: translateY(-4px); }
        .dashboard-card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .form-control {
            border-radius: 8px; border: 2px solid #e2e8f0;
            padding: 10px; font-size: 15px; width: 100%; margin-bottom: 8px;
        }
        .form-control:focus { border-color: var(--primary-light); outline: none; }
        .chat-container { height: 350px; overflow-y: auto; padding: 15px; background: #f8fafc; border-radius: 10px; }
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; margin-bottom: 8px; }
        .chat-bubble.doctor { background: #f1f5f9; margin-right: auto; }
        .chat-bubble.parent { background: var(--primary); color: white; margin-left: auto; }
        .faq-item {
            border-left: 3px solid var(--primary); padding: 0.8rem; margin-bottom: 0.8rem;
            background: white; cursor: pointer;
        }
        .clock-widget {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white; border-radius: var(--radius); padding: 1.5rem; text-align: center;
        }
        .clock-widget .time { font-size: 2.5rem; font-weight: 800; }
        .calendar-widget { background: white; border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); }
        .calendar-widget table { width: 100%; border-collapse: collapse; }
        .calendar-widget td { text-align: center; padding: 4px; cursor: pointer; font-size: 0.85rem; }
        .calendar-widget td.today { background: var(--primary); color: white; border-radius: 50%; }
        footer { text-align: center; padding: 20px; background: white; margin-top: 40px; }
        .toast {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            padding: 12px 18px; border-radius: 10px; color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="fw-bold" style="color: var(--primary); cursor: pointer; font-size: 1.3rem;" onclick="App.navigate('/dashboard')">🧬 Орфанный помощник</span>
            <div id="navMenu" class="d-flex gap-1 flex-wrap"></div>
        </div>
    </nav>

    <div class="container my-3" id="app"></div>

    <footer>
        <p class="fw-bold" style="color: var(--primary);">🧬 Орфанный помощник</p>
        <p class="text-muted small">Персонализированный помощник с паллиативным модулем</p>
        <p class="text-muted small">Разработчик: Истин А.А. © 2026 | Научный руководитель: д.м.н. Леднева В.С.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            window.App = window.App || {};
          const SUPABASE_URL = 'https://plejzaehtlcesxszugcx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZWp6YWVodGxjZXN4c3p1Z2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDkxNzcsImV4cCI6MjA5ODI4NTE3N30.xWlI0egd7wLjyCcv30_Gr95hVv4jShdrIAxo_IaKrNM';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
});

            let currentUser = null, currentProfile = null, chatTimer = null, clockTimer = null;

            const notify = (msg, type = 'success') => {
                const el = document.createElement('div');
                el.className = 'toast';
                el.style.background = type === 'error' ? '#ef4444' : '#10b981';
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            };
            const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
            const fmtDate = d => new Date(d).toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

            const DISEASES = [
                { id:'cf', name:'Муковисцидоз', icd:'E84', icon:'🫁', desc:'Поражение экзокринных желез, густой секрет.', diag:'Потовый тест, CFTR.', treat:'Муколитики, CFTR-модуляторы.', gene:'CFTR (7q31.2)', mutations:'F508del (70%)', algorithm:'1. Потовый тест → 2. Анализ CFTR → 3. Спирометрия' },
                { id:'pku', name:'Фенилкетонурия', icd:'E70.0', icon:'🧠', desc:'Дефицит фенилаланингидроксилазы.', diag:'Неонатальный скрининг.', treat:'Диета с низким Phe.', gene:'PAH (12q23.2)', mutations:'R408W', algorithm:'1. Скрининг → 2. Анализ PAH' },
                { id:'wilson', name:'Болезнь Вильсона', icd:'E83.0', icon:'🧬', desc:'Накопление меди в печени, мозге.', diag:'Церулоплазмин <200 мг/л.', treat:'D-пеницилламин.', gene:'ATP7B (13q14.3)', mutations:'H1069Q', algorithm:'1. Церулоплазмин → 2. Медь в моче' },
                { id:'gaucher', name:'Болезнь Гоше', icd:'E75.2', icon:'🦴', desc:'Гепатоспленомегалия, костные кризы.', diag:'β-глюкоцереброзидаза.', treat:'ФЗТ.', gene:'GBA (1q21)', mutations:'N370S', algorithm:'1. Активность GBA' },
                { id:'fabry', name:'Болезнь Фабри', icd:'E75.2', icon:'💔', desc:'Акропарестезии, ангиокератомы.', diag:'α-галактозидаза.', treat:'ФЗТ.', gene:'GLA (Xq22.1)', mutations:'Более 900', algorithm:'1. α-Gal A → 2. Анализ GLA' }
            ];

            const FAQ = [
                { q:'Что такое орфанные заболевания?', a:'Редкие заболевания, распространённость менее 10 случаев на 100 000 населения.' },
                { q:'Как получить лекарства через фонд «Круг добра»?', a:'Обратитесь к лечащему врачу для подачи заявки.' }
            ];

            window.App = {
                navigate: (page) => { window.location.hash = '#' + page; },
                logout: async () => {
                    if (chatTimer) clearInterval(chatTimer);
                    if (clockTimer) clearInterval(clockTimer);
                    await db.auth.signOut();
                    localStorage.removeItem('orphan_user');
                    currentUser = null; currentProfile = null;
                    updateNav(); App.navigate('/');
                }
            };

            async function updateNav() {
                const nav = document.getElementById('navMenu');
                if (!nav) return;
                const saved = localStorage.getItem('orphan_user');
                if (saved) {
                    currentUser = JSON.parse(saved);
                    try {
                        const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
                        if (data) currentProfile = data;
                    } catch(e) {}
                }
                if (!currentUser) {
                    nav.innerHTML = '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/login\')">🔐 Войти</button>';
                } else {
                    const role = currentProfile?.role;
                    let items = '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/dashboard\')">🏠</button>';
                    if (role === 'parent') {
                        items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/diary\')">📋 Дневник</button>';
                        items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/palliative\')">❤️ Паллиатив</button>';
                        items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/medications\')">💊</button>';
                        items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/chat\')">💬</button>';
                    } else {
                        items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/patients\')">👥 Пациенты</button>';
                        items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/analytics\')">📈 Аналитика</button>';
                    }
                    items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/reference\')">📚</button>';
                    items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/genetics\')">🧬</button>';
                    items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/faq\')">❓</button>';
                    items += '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/support\')">❤️</button>';
                    items += '<button class="btn btn-danger btn-sm" onclick="App.logout()">🚪</button>';
                    nav.innerHTML = items;
                }
            }

            async function render() {
                await updateNav();
                const page = window.location.hash.slice(1) || '/';
                const app = document.getElementById('app');
                if (!app) return;
                if (!currentUser && !['/', '/login', '/reference', '/faq', '/genetics', '/support'].includes(page)) {
                    App.navigate('/login'); return;
                }
                switch (page) {
                    case '/': app.innerHTML = renderWelcome(); break;
                    case '/login': app.innerHTML = renderLogin(); setupLogin(); break;
                    case '/dashboard': app.innerHTML = await renderDashboard(); initClock(); initCalendar(); break;
                    case '/diary': app.innerHTML = await renderDiary(); setupDiary(); break;
                    case '/palliative': app.innerHTML = await renderPalliative(); setupPalliative(); break;
                    case '/medications': app.innerHTML = await renderMedications(); setupMedications(); break;
                    case '/chat': app.innerHTML = renderChat(); startChat(); break;
                    case '/patients': app.innerHTML = await renderPatients(); break;
                    case '/analytics': app.innerHTML = await renderAnalytics(); break;
                    case '/reference': app.innerHTML = renderReference(); break;
                    case '/genetics': app.innerHTML = renderGenetics(); setupGenetics(); break;
                    case '/faq': app.innerHTML = renderFAQ(); break;
                    case '/support': app.innerHTML = renderSupport(); break;
                    default: app.innerHTML = '<h2>404</h2>';
                }
            }

            function renderWelcome() {
                return `<div class="text-center mt-5"><h1>🧬 Орфанный помощник</h1><p class="text-muted">Персонализированный помощник с паллиативным модулем</p><button class="btn btn-primary mt-4" onclick="App.navigate('/login')">Войти</button></div>`;
            }

            function renderLogin() {
                return `<div class="text-center mt-5"><h2>🔐 Вход</h2><div class="row justify-content-center mt-4">
                    <div class="col-md-5 mb-3"><div class="card"><h4>👨‍⚕️ Врач</h4><input id="docName" class="form-control" placeholder="ФИО"><input id="docCode" class="form-control" type="password" placeholder="Код доступа"><button class="btn btn-primary w-100" onclick="window.loginAsDoctor()">Войти</button></div></div>
                    <div class="col-md-5 mb-3"><div class="card"><h4>👤 Пациент</h4><input id="patName" class="form-control" placeholder="ФИО"><button class="btn btn-success w-100" onclick="window.loginAsPatient()">Войти</button></div></div>
                </div></div>`;
            }

            function setupLogin() {
                window.loginAsDoctor = async () => {
                    const name = document.getElementById('docName').value.trim();
                    if (!name) return notify('Введите ФИО', 'error');
                    if (document.getElementById('docCode').value !== '123doc') return notify('Неверный код', 'error');
                    await createOrLogin(name, 'doctor');
                };
                window.loginAsPatient = async () => {
                    const name = document.getElementById('patName').value.trim();
                    if (!name) return notify('Введите ФИО', 'error');
                    await createOrLogin(name, 'parent');
                };
            }

            async function createOrLogin(name, role) {
                const safeName = name.toLowerCase().replace(/\s+/g, '_');
                const email = `${role}_${safeName}@orphan.local`;
                
                try {
                    let { data } = await db.auth.signInWithPassword({ email, password: 'defaultPass123' });
                    if (!data?.user) {
                        ({ data } = await db.auth.signUp({ email, password: 'defaultPass123' }));
                        await new Promise(r => setTimeout(r, 1000));
                    }
                    if (data?.user) {
                        await db.from('profiles').upsert({ id: data.user.id, full_name: name, role });
                        currentUser = data.user;
                        currentProfile = { id: data.user.id, full_name: name, role };
                        localStorage.setItem('orphan_user', JSON.stringify({ id: data.user.id }));
                        updateNav(); App.navigate('/dashboard');
                    }
                } catch (e) {
                    notify('Ошибка: ' + e.message, 'error');
                }
            }

            async function renderDashboard() {
                const isDoctor = currentProfile?.role === 'doctor';
                let cards = [];
                
                if (isDoctor) {
                    const { count } = await db.from('profiles').select('*', { count: 'exact', head: true }).eq('role', 'parent').eq('doctor_id', currentUser.id);
                    cards = [
                        { icon:'👥', title:`Пациенты (${count})`, link:'/patients' },
                        { icon:'📈', title:'Аналитика', link:'/analytics' }
                    ];
                } else {
                    cards = [
                        { icon:'📋', title:'Дневник', link:'/diary' },
                        { icon:'❤️', title:'Паллиатив', link:'/palliative' },
                        { icon:'💊', title:'Лекарства', link:'/medications' },
                        { icon:'💬', title:'Чат', link:'/chat' }
                    ];
                    
                    if (currentProfile?.doctor_id) {
                        try {
                            const { data: doctor } = await db.from('profiles').select('full_name').eq('id', currentProfile.doctor_id).single();
                            if (doctor) cards.unshift({ icon:'👨‍⚕️', title:`Врач: ${doctor.full_name}`, link:'/patients' });
                        } catch(e) {}
                    }
                }
                
                return `<div class="row"><div class="col-lg-9"><h2>👋 ${esc(currentProfile?.full_name)}</h2><div class="row mt-3">${cards.map(c => `<div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('${c.link}')"><div class="icon">${c.icon}</div><h5>${c.title}</h5></div></div>`).join('')}</div></div>
                <div class="col-lg-3"><div class="clock-widget mb-3"><div class="time" id="liveClock">--:--:--</div><div class="date" id="liveDate"></div></div><div class="calendar-widget" id="miniCalendar"></div></div></div>`;
            }

            async function renderDiary() {
                const today = new Date().toISOString().split('T')[0];
                let entry = {};
                try {
                    const { data } = await db.from('diary_entries').select('*').eq('user_id', currentUser.id).eq('entry_date', today).maybeSingle();
                    if (data) entry = data;
                } catch(e) {}
                
                return `<h2>📋 Дневник — ${fmtDate(today)}</h2><div class="card"><form id="diaryForm">
                    <input type="number" name="temperature" class="form-control" placeholder="Температура °C" step="0.1" value="${esc(entry.temperature||'')}">
                    <input name="pressure" class="form-control" placeholder="Давление 120/80" value="${esc(entry.pressure||'')}">
                    <input type="number" name="weight" class="form-control" placeholder="Вес (кг)" step="0.1" value="${esc(entry.weight||'')}">
                    <label>Самочувствие (1-10)</label><input type="range" name="wellbeing" class="form-range" min="1" max="10" value="${entry.wellbeing||5}">
                    <textarea name="symptoms" class="form-control" rows="2" placeholder="Симптомы">${esc(entry.symptoms||'')}</textarea>
                    <button type="submit" class="btn btn-primary w-100 mt-2" id="diaryBtn">💾 Сохранить</button>
                </form></div>`;
            }

            function setupDiary() {
                document.getElementById('diaryForm')?.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('diaryBtn');
                    btn.disabled = true;
                    btn.textContent = '⏳ Сохранение...';
                    try {
                        const today = new Date().toISOString().split('T')[0];
                        await db.from('diary_entries').upsert({
                            user_id: currentUser.id, entry_date: today,
                            temperature: parseFloat(e.target.temperature.value) || null,
                            pressure: e.target.pressure.value || null,
                            weight: parseFloat(e.target.weight.value) || null,
                            wellbeing: parseInt(e.target.wellbeing.value),
                            symptoms: e.target.symptoms.value
                        });
                        notify('✅ Сохранено!');
                    } catch(e) {
                        notify('Ошибка: ' + e.message, 'error');
                    }
                    btn.disabled = false;
                    btn.textContent = '💾 Сохранить';
                });
            }

            async function renderPalliative() {
                const today = new Date().toISOString().split('T')[0];
                let entry = {};
                try {
                    const { data } = await db.from('palliative_entries').select('*').eq('user_id', currentUser.id).eq('entry_date', today).maybeSingle();
                    if (data) entry = data;
                } catch(e) {}
                
                return `<h2>❤️ Паллиативный модуль</h2><div class="card"><form id="pallForm">
                    ${['pain:Боль:😢','nausea:Тошнота:🤢','appetite:Аппетит:🍽️','sleep:Сон:😴','mood:Настроение:😊','dyspnea:Одышка:🫁','fatigue:Усталость:😩','quality:Качество жизни:⭐'].map(f => {
                        const [id, label, emoji] = f.split(':');
                        return `<label>${emoji} ${label} (0-10)</label><input type="range" name="${id}" class="form-range" min="0" max="10" value="${entry[id]||5}">`;
                    }).join('')}
                    <button type="submit" class="btn btn-danger w-100 mt-2" id="pallBtn">💾 Сохранить</button>
                </form></div>`;
            }

            function setupPalliative() {
                document.getElementById('pallForm')?.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('pallBtn');
                    btn.disabled = true;
                    try {
                        const today = new Date().toISOString().split('T')[0];
                        const data = { user_id: currentUser.id, entry_date: today };
                        ['pain','nausea','appetite','sleep','mood','dyspnea','fatigue','quality'].forEach(id => data[id] = parseInt(e.target[id].value));
                        await db.from('palliative_entries').upsert(data);
                        notify('✅ Сохранено!');
                    } catch(e) {
                        notify('Ошибка: ' + e.message, 'error');
                    }
                    btn.disabled = false;
                });
            }

            async function renderMedications() {
                let meds = [];
                try {
                    const { data } = await db.from('medications').select('*').eq('user_id', currentUser.id);
                    if (data) meds = data;
                } catch(e) {}
                
                return `<h2>💊 Лекарства</h2><button class="btn btn-primary mb-3" onclick="window.addMed()">+ Добавить</button>
                ${meds.map(m => `<div class="card mb-2"><h5>${esc(m.name)}</h5><p class="text-muted">${esc(m.dosage)} | Ост: ${m.quantity}</p></div>`).join('') || '<p>Нет лекарств</p>'}`;
            }

            function setupMedications() {
                window.addMed = async () => {
                    const name = prompt('Название:'), dosage = prompt('Дозировка:'), qty = prompt('Количество:');
                    if (name) {
                        try {
                            await db.from('medications').insert({ user_id: currentUser.id, name, dosage, quantity: parseInt(qty)||0 });
                            render();
                        } catch(e) {
                            notify('Ошибка: ' + e.message, 'error');
                        }
                    }
                };
            }

            function renderChat() {
                return `<h2>💬 Чат</h2><div class="card p-0"><div class="chat-container" id="chatMessages"></div><div class="p-3 d-flex gap-2"><input id="msgInput" class="form-control" placeholder="Сообщение..."><button class="btn btn-primary" onclick="window.sendChat()">📤</button></div></div>`;
            }

            async function loadChat() {
                try {
                    const { data: msgs } = await db.from('chat_messages').select('*').or(`from_user_id.eq.${currentUser.id},to_user_id.eq.${currentUser.id}`).order('created_at', { ascending: true });
                    const div = document.getElementById('chatMessages');
                    if (div) {
                        div.innerHTML = (msgs||[]).map(m => `<div class="chat-bubble ${m.from_user_id===currentUser.id?'parent':'doctor'}">${esc(m.text)}</div>`).join('') || '<p class="text-muted text-center mt-5">Нет сообщений</p>';
                        div.scrollTop = div.scrollHeight;
                    }
                } catch(e) {}
            }

            function startChat() {
                if (chatTimer) clearInterval(chatTimer);
                loadChat(); chatTimer = setInterval(loadChat, 3000);
                window.sendChat = async () => {
                    const input = document.getElementById('msgInput');
                    if (!input.value.trim()) return;
                    try {
                        const { data: docs } = await db.from('profiles').select('id').eq('role', 'doctor').limit(1);
                        if (!docs?.length) return notify('Нет доступных врачей', 'error');
                        await db.from('chat_messages').insert({ from_user_id: currentUser.id, to_user_id: docs[0].id, text: input.value.trim() });
                        input.value = ''; loadChat();
                    } catch(e) {
                        notify('Ошибка: ' + e.message, 'error');
                    }
                };
            }

            async function renderPatients() {
                if (currentProfile?.role !== 'doctor') {
                    let doctorHtml = '<p>Вы не прикреплены к врачу</p>';
                    if (currentProfile?.doctor_id) {
                        try {
                            const { data: doc } = await db.from('profiles').select('full_name').eq('id', currentProfile.doctor_id).single();
                            if (doc) doctorHtml = `<div class="card"><h5>Ваш врач: ${esc(doc.full_name)}</h5></div>`;
                        } catch(e) {}
                    }
                    return `<h2>👤 Мой врач</h2>${doctorHtml}`;
                }

                try {
                    const { data: myPatients } = await db.from('profiles').select('*').eq('role', 'parent').eq('doctor_id', currentUser.id);
                    const { data: available } = await db.from('profiles').select('*').eq('role', 'parent').is('doctor_id', null);

                    let html = `<h2>👥 Мои пациенты (${myPatients?.length || 0})</h2>`;
                    if (myPatients?.length) {
                        html += myPatients.map(p => `<div class="card mb-2 d-flex justify-content-between align-items-center"><span>${esc(p.full_name)}</span><div><button class="btn btn-sm btn-primary me-2" onclick="App.navigate('/analytics?patient=${p.id}')">📊</button><button class="btn btn-sm btn-danger" onclick="window.detachPatient('${p.id}')">Открепить</button></div></div>`).join('');
                    } else {
                        html += '<p class="text-muted">Нет прикреплённых пациентов</p>';
                    }

                    html += `<h3 class="mt-4">🔍 Доступные пациенты</h3>`;
                    if (available?.length) {
                        html += `<input id="searchPatient" class="form-control mb-3" placeholder="Поиск по имени..." oninput="window.filterPatients()"><div id="availableList">`;
                        html += available.map(p => `<div class="card mb-2 d-flex justify-content-between align-items-center patient-item" data-name="${p.full_name.toLowerCase()}"><span>${esc(p.full_name)}</span><button class="btn btn-sm btn-primary" onclick="window.attachPatient('${p.id}')">Прикрепить</button></div>`).join('');
                        html += `</div>`;
                    } else {
                        html += '<p class="text-muted">Нет доступных пациентов</p>';
                    }
                    return html;
                } catch(e) {
                    return '<p class="text-danger">Ошибка загрузки: ' + e.message + '</p>';
                }
            }

            window.attachPatient = async (id) => {
                try {
                    await db.from('profiles').update({ doctor_id: currentUser.id }).eq('id', id);
                    notify('Пациент прикреплён');
                    render();
                } catch(e) {
                    notify('Ошибка: ' + e.message, 'error');
                }
            };

            window.detachPatient = async (id) => {
                try {
                    await db.from('profiles').update({ doctor_id: null }).eq('id', id);
                    notify('Пациент откреплён');
                    render();
                } catch(e) {
                    notify('Ошибка: ' + e.message, 'error');
                }
            };

            window.filterPatients = () => {
                const q = document.getElementById('searchPatient')?.value.toLowerCase() || '';
                document.querySelectorAll('#availableList .patient-item').forEach(el => {
                    el.style.display = el.dataset.name.includes(q) ? '' : 'none';
                });
            };

            async function renderAnalytics() {
                if (currentProfile?.role !== 'doctor') return '<p>Только для врачей</p>';

                const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
                let patientId = params.get('patient');

                if (patientId) {
                    try {
                        const { data: patient } = await db.from('profiles').select('*').eq('id', patientId).eq('doctor_id', currentUser.id).single();
                        if (!patient) { notify('Нет доступа', 'error'); patientId = null; }
                    } catch(e) { patientId = null; }
                }

                if (!patientId) {
                    try {
                        const { data: patients } = await db.from('profiles').select('*').eq('role', 'parent').eq('doctor_id', currentUser.id);
                        return `<h2>📈 Аналитика пациентов</h2>${patients?.map(p => `<div class="card mb-2"><span>${esc(p.full_name)}</span><button class="btn btn-sm btn-primary" onclick="App.navigate('/analytics?patient=${p.id}')">📊 Открыть</button></div>`).join('') || '<p>Нет пациентов</p>'}`;
                    } catch(e) {
                        return '<p class="text-danger">Ошибка загрузки</p>';
                    }
                }

                try {
                    const { data: patient } = await db.from('profiles').select('*').eq('id', patientId).single();
                    const { data: diary } = await db.from('diary_entries').select('*').eq('user_id', patientId).order('entry_date', { ascending: false }).limit(7);
                    const { data: palliative } = await db.from('palliative_entries').select('*').eq('user_id', patientId).order('entry_date', { ascending: false }).limit(7);
                    const { data: meds } = await db.from('medications').select('*').eq('user_id', patientId);

                    return `<h2>📈 Аналитика: ${esc(patient?.full_name||'Пациент')}</h2>
                    <button class="btn btn-outline btn-sm mb-3" onclick="App.navigate('/patients')">← Назад</button>
                    
                    <h4>📋 Дневник здоровья</h4>
                    <div class="row">${(diary||[]).map(d => `<div class="col-md-6 mb-2"><div class="card"><small>${d.entry_date}</small><br>Темп: ${d.temperature||'—'}°C | Вес: ${d.weight||'—'} кг | Самочувствие: ${d.wellbeing}/10</div></div>`).join('') || '<p>Нет данных</p>'}</div>
                    
                    <h4 class="mt-3">❤️ Паллиативные показатели</h4>
                    <div class="row">${(palliative||[]).map(p => `<div class="col-md-6 mb-2"><div class="card"><small>${p.entry_date}</small><br>Боль: ${p.pain}/10 | Качество жизни: ${p.quality}/10 | Аппетит: ${p.appetite}/10</div></div>`).join('') || '<p>Нет данных</p>'}</div>
                    
                    <h4 class="mt-3">💊 Лекарства</h4>
                    ${(meds||[]).map(m => `<div class="card mb-2"><strong>${esc(m.name)}</strong> — ${esc(m.dosage)} (ост: ${m.quantity})</div>`).join('') || '<p>Нет лекарств</p>'}`;
                } catch(e) {
                    return '<p class="text-danger">Ошибка загрузки аналитики</p>';
                }
            }

            function renderReference() {
                return `<h2>📚 Справочник</h2><input id="searchDisease" class="form-control" placeholder="🔍 Поиск..." oninput="window.filterDiseases()"><div class="row mt-3" id="diseaseList">${DISEASES.map(d => `<div class="col-md-4 mb-3"><div class="card" onclick="notify('${d.name}','${d.desc}')"><h6>${d.icon} ${esc(d.name)}</h6><small>${d.icd}</small></div></div>`).join('')}</div>`;
            }

            window.filterDiseases = () => {
                const q = document.getElementById('searchDisease')?.value.toLowerCase()||'';
                document.querySelectorAll('#diseaseList .col-md-4').forEach(c => c.style.display = c.textContent.toLowerCase().includes(q)?'':'none');
            };

            function renderGenetics() {
                return `<h2>🧬 Генетика</h2><div class="card mb-3"><h5>Калькулятор риска</h5>
                <select id="fatherStatus" class="form-select mb-2"><option value="carrier">Носитель (Aa)</option><option value="healthy">Здоров (AA)</option><option value="sick">Болен (aa)</option></select>
                <select id="motherStatus" class="form-select mb-2"><option value="carrier">Носитель (Aa)</option><option value="healthy">Здорова (AA)</option><option value="sick">Больна (aa)</option></select>
                <button class="btn btn-primary w-100" onclick="calcRisk()">Рассчитать</button><div id="riskResult" class="mt-2 text-center fw-bold"></div></div>
                <div class="row">${DISEASES.map(d => `<div class="col-md-6 mb-3"><div class="card"><h6>${d.icon} ${esc(d.name)}</h6><p><strong>Ген:</strong> ${d.gene||'—'}</p></div></div>`).join('')}</div>`;
            }

            function setupGenetics() {
                window.calcRisk = () => {
                    const f = document.getElementById('fatherStatus')?.value, m = document.getElementById('motherStatus')?.value;
                    if (!f || !m) return;
                    let risk = 0;
                    if (f==='carrier'&&m==='carrier') risk=25;
                    else if ((f==='carrier'&&m==='sick')||(f==='sick'&&m==='carrier')) risk=50;
                    else if (f==='sick'&&m==='sick') risk=100;
                    const el = document.getElementById('riskResult');
                    if (el) el.textContent = `Вероятность: ${risk}%`;
                };
            }

            function renderFAQ() {
                return `<h2>❓ FAQ</h2>${FAQ.map(f => `<div class="faq-item" onclick="this.querySelector('.a').style.display=this.querySelector('.a').style.display==='block'?'none':'block'"><h6>${f.q}</h6><p class="a text-muted" style="display:none;">${f.a}</p></div>`).join('')}`;
            }

            function renderSupport() {
                return `<h2>❤️ Круг добра</h2><div class="card"><p>Фонд поддержки детей с орфанными заболеваниями.</p><p>📞 8-800-555-35-35</p><button class="btn btn-primary" onclick="notify('Заявка сформирована')">Подать заявку</button></div>`;
            }

            function initClock() {
                const update = () => {
                    const now = new Date();
                    const clock = document.getElementById('liveClock'), date = document.getElementById('liveDate');
                    if (clock) clock.textContent = now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
                    if (date) date.textContent = now.toLocaleDateString('ru-RU', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
                };
                update(); if (clockTimer) clearInterval(clockTimer); clockTimer = setInterval(update, 1000);
            }

            function initCalendar() {
                const cal = document.getElementById('miniCalendar');
                if (!cal) return;
                const now = new Date();
                const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay() || 7;
                const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
                let html = `<strong>${months[now.getMonth()]} ${now.getFullYear()}</strong><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`;
                for (let i=1; i<firstDay; i++) html += '<td></td>';
                for (let d=1; d<=daysInMonth; d++) {
                    if ((firstDay+d-1)%7===1 && d>1) html += '</tr><tr>';
                    html += `<td class="${d===now.getDate()?'today':''}">${d}</td>`;
                }
                html += '</tr></table>'; cal.innerHTML = html;
            }

            window.onhashchange = () => { if(chatTimer)clearInterval(chatTimer); if(clockTimer)clearInterval(clockTimer); render(); };
            window.onload = render;
            window.App = App;
        })();
    </script>
</body>
</html>
